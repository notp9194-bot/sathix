- name: Write local.properties
  run: |
    echo "CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME:-dvqqgqdls}" >> local.properties
    echo "CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}" >> local.properties
    echo "CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}" >> local.properties
    echo "SIGNALING_SERVER_URL=${SIGNALING_SERVER_URL:-https://your-render-app.onrender.com}" >> local.properties
    echo "STUN_SERVER=${STUN_SERVER:-stun:stun.l.google.com:19302}" >> local.properties
    echo "TURN_SERVER=${TURN_SERVER}" >> local.properties
    echo "TURN_USERNAME=${TURN_USERNAME}" >> local.properties
    echo "TURN_PASSWORD=${TURN_PASSWORD}" >> local.properties
