name: Android CI - Build APK

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.7

      - name: Generate Gradle wrapper if missing
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.7
          fi
          chmod +x gradlew

      - name: Decode keystore (if provided)
        if: ${{ secrets.SIGNING_KEYSTORE != '' }}
        env:
          SIGNING_KEYSTORE: ${{ secrets.SIGNING_KEYSTORE }}
        run: |
          mkdir -p $HOME/.keystore
          echo "$SIGNING_KEYSTORE" | base64 --decode > $HOME/.keystore/release.keystore
          echo "KEYSTORE_PATH=$HOME/.keystore/release.keystore" >> $GITHUB_ENV

      - name: Set version code from run number
        run: |
          echo "VERSION_CODE=${{ github.run_number }}" >> $GITHUB_ENV
          echo "VERSION_NAME=1.0.${{ github.run_number }}" >> $GITHUB_ENV

      - name: Write local.properties
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          SIGNALING_SERVER_URL: ${{ secrets.SIGNALING_SERVER_URL }}
          STUN_SERVER: ${{ secrets.STUN_SERVER }}
          TURN_SERVER: ${{ secrets.TURN_SERVER }}
          TURN_USERNAME: ${{ secrets.TURN_USERNAME }}
          TURN_PASSWORD: ${{ secrets.TURN_PASSWORD }}
        run: |
          {
            echo "CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME:-dvqqgqdls}"
            echo "CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}"
            echo "CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}"
            echo "SIGNALING_SERVER_URL=${SIGNALING_SERVER_URL:-https://your-render-app.onrender.com}"
            echo "STUN_SERVER=${STUN_SERVER:-stun:stun.l.google.com:19302}"
            echo "TURN_SERVER=${TURN_SERVER}"
            echo "TURN_USERNAME=${TURN_USERNAME}"
            echo "TURN_PASSWORD=${TURN_PASSWORD}"
          } >> local.properties

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Build Release APK
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SathiX-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Upload Release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SathiX-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: Create GitHub Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
